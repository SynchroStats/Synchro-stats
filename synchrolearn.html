function MarkdownRenderer({ text }) {
const html = text
.replace(/^## (.+)$/gm, ‘<h2 class="md-h2">$1</h2>’)
.replace(/^### (.+)$/gm, ‘<h3 class="md-h3">$1</h3>’)
.replace(/**(.+?)**/g, ‘<strong>$1</strong>’)
.replace(/*(.+?)*/g, ‘<em>$1</em>’)
.replace(/^- (.+)$/gm, ‘<li>$1</li>’)
.replace(/(<li>.*</li>\n?)+/g, m => `<ul>${m}</ul>`)
.replace(/\n\n/g, ‘</p><p>’);
return <div className=“markdown-body” dangerouslySetInnerHTML={{ __html: `<p>${html}</p>` }} />;
}

if (!apiKey) return <ApiKeyScreen onSave={setApiKey} />;

const topic = TOPICS.find(t => t.id === selectedTopic);
const accentColor = topic?.color || “#38bdf8”;

async function callClaude(userMessage, system = SYSTEM_PROMPT) {
const body = { model:“claude-sonnet-4-6”, max_tokens:1000, stream:false, messages:[{ role:“user”, content:userMessage }] };
if (system) body.system = system;
let response, data;
try {
response = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”,
headers:{ “Content-Type”:“application/json”, “x-api-key”: apiKey, “anthropic-version”:“2023-06-01”, “anthropic-dangerous-direct-browser-access”:“true” },
body: JSON.stringify(body),
});
} catch(e) { throw new Error(“Réseau inaccessible : “ + e.message); }
try { data = await response.json(); } catch(e) { throw new Error(“Réponse illisible (HTTP “ + response.status + “)”); }
if (!response.ok) throw new Error(“HTTP “ + response.status + “ — “ + (data?.error?.message || “erreur API”));
if (!data.content || !Array.isArray(data.content)) throw new Error(“Structure inattendue”);
return data.content.map(b => b.text || “”).join(””);
}

async function generateCourse(subtopic) {
setPhase(“loading-course”); setError(null); setCourse(””); setQuestions([]); setAnswers({}); setSubmitted(false);
const cacheKey = “sl_course_” + btoa(encodeURIComponent(subtopic.slice(0,60))).replace(/=/g,””);
const cached = localStorage.getItem(cacheKey);
if (cached) { setCourse(cached); setPhase(“course”); return; }
try {
const text = await callClaude(`Fais-moi un cours complet et rigoureux sur : "${subtopic}", en lien avec le patinage synchronisé. Structure avec 4-5 sections claires, cite des auteurs et études scientifiques.`);
setCourse(text);
try { localStorage.setItem(cacheKey, text); } catch(e){}
setPhase(“course”);
} catch(e) { setError(“Erreur : “ + e.message); setPhase(“subtopic”); }
}

async function extendCourse() {
setExtending(true); setError(null);
try {
const more = await callClaude(`Suite du cours sur "${selectedSubtopic}" (patinage synchronisé). Continue avec des sections supplémentaires : exemples pratiques, applications sur glace, points avancés.\n\nDernier paragraphe du cours :\n${course.slice(-600)}`);
const extended = course + “\n\n—\n\n” + more;
setCourse(extended);
const cacheKey = “sl_course_” + btoa(encodeURIComponent(selectedSubtopic.slice(0,60))).replace(/=/g,””);
try { localStorage.setItem(cacheKey, extended); } catch(e){}
} catch(e) { setError(“Erreur approfondissement : “ + e.message); }
setExtending(false);
}

async function generateQCM() {
setPhase(“loading-qcm”); setError(null);
try {

const parsed = JSON.parse(clean);
setQuestions(parsed); setAnswers({}); setSubmitted(false); setPhase(“qcm”);
} catch(e) { setError(“Erreur QCM : “ + e.message); setPhase(“course”); }
}

const score = questions.filter((q,i) => answers[i] === q.correct).length;

<div className="app" style={{"--c": accentColor}}>
  <div className="bg-grid"/>
  <div className="bg-glow" style={{width:500,height:500,background:accentColor,top:-180,right:-180}}/>
  <div className="bg-glow" style={{width:350,height:350,background:"#818cf8",bottom:-100,left:-100}}/>
  <div className="content">

    {/* HEADER */}
    <div className="header">
      <div className="logo">
        <IceCrystal size={26} opacity={0.7}/>
        <span className="logo-text">Synchro<span>Learn</span></span>
      </div>
      <div style={{display:"flex",gap:8}}>
        {phase !== "home" && <button className="back-btn" onClick={reset}>← Accueil</button>}
        <button className="settings-btn" onClick={() => { if(confirm("Changer de clé API ?")) { localStorage.removeItem("sl_apikey"); setApiKey(""); }}}>🔑</button>
      </div>
    </div>

    {/* HOME */}
    {phase === "home" && <>
      <div className="home-hero">
        <h1 className="home-title">Ta formation<br/><em>coaching</em> sur mesure</h1>
        <p className="home-sub">Cours scientifiques + QCM interactifs sur le patinage synchronisé, la préparation physique et le management d'équipe.</p>
      </div>
      <div className="topics-grid">
        {TOPICS.map(t => (
          <div key={t.id} className="topic-card" style={{"--c":t.color}} onClick={() => { setSelectedTopic(t.id); setPhase("subtopic"); }}>
            <span className="topic-icon">{t.icon}</span>
            <div className="topic-label">{t.label}</div>
            <div className="topic-count">{t.subtopics.length} thèmes proposés</div>
            <span className="topic-arrow">→</span>
          </div>
        ))}
      </div>
    </>}

    {/* SUBTOPIC */}
    {phase === "subtopic" && topic && (
      <div className="panel" style={{"--c":topic.color}}>
        <div className="panel-title">{topic.icon} {topic.label}</div>
        <p className="panel-sub">Choisis un thème ou entre le tien</p>
        <div className="subtopic-list">
          {topic.subtopics.map((s,i) => (
            <button key={i} className="subtopic-btn" style={{"--c":topic.color}} onClick={() => { setSelectedSubtopic(s); generateCourse(s); }}>
              <span style={{marginRight:8,opacity:0.5}}>→</span>{s}
            </button>
          ))}
        </div>
        {error && <div className="error-msg">{error}</div>}
        <div className="divider"><div className="divider-line"/><span className="divider-text">ou ton propre sujet</span><div className="divider-line"/></div>
        <textarea className="custom-input" style={{"--c":topic.color}} placeholder="Ex : Comment gérer la fatigue en fin de saison ?" value={customTopic} onChange={e => setCustomTopic(e.target.value)}/>
        <button className="primary-btn" style={{background:topic.color}} disabled={!customTopic.trim()} onClick={() => { const s=customTopic.trim(); setSelectedSubtopic(s); generateCourse(s); }}>Générer le cours →</button>
      </div>
    )}

    {/* LOADING COURSE */}
    {phase === "loading-course" && (
      <div className="loading-screen">
        <IceCrystal size={64} opacity={0.5} spin={true}/>
        <div className="loading-text">Génération du cours</div>
        <p style={{color:"#334155",fontSize:"0.83rem"}}>{selectedSubtopic}</p>
      </div>
    )}

    {/* LOADING QCM */}
    {phase === "loading-qcm" && (
      <div className="loading-screen">
        <IceCrystal size={64} opacity={0.5} spin={true}/>
        <div className="loading-text">Préparation du QCM</div>
      </div>
    )}

    {/* COURSE */}
    {phase === "course" && (
      <div className="course-wrapper" ref={courseRef}>
        <div className="course-tag"><span>{topic?.icon}</span> {topic?.label}</div>
        <h2 className="course-title">{selectedSubtopic}</h2>
        <div className="course-body">
          <MarkdownRenderer text={course}/>
          {extending && <div style={{textAlign:"center",padding:"20px 0",color:"#64748b",fontSize:"0.88rem"}}><IceCrystal size={28} opacity={0.4} spin={true}/><div style={{marginTop:8}}>Approfondissement…</div></div>}
        </div>
        {error && <div className="error-msg">{error}</div>}
        <div className="course-actions">
          <button className="primary-btn" style={{background:accentColor}} onClick={generateQCM} disabled={extending}>🎯 Tester mes connaissances</button>
          <button className="ghost-btn" onClick={extendCourse} disabled={extending}>{extending ? "⏳ En cours…" : "📖 Approfondir"}</button>
          <button className="ghost-btn" onClick={() => setPhase("subtopic")}>← Changer</button>
        </div>
      </div>
    )}

    {/* QCM */}
    {(phase === "qcm" || phase === "results") && questions.length > 0 && (
      <div className="qcm-wrapper">
        <div className="qcm-progress"><div className="qcm-progress-bar" style={{width: `${Object.keys(answers).length/questions.length*100}%`}}/></div>
        <h2 className="panel-title" style={{marginBottom:4}}>QCM</h2>
        <p className="panel-sub" style={{marginBottom:24}}>{selectedSubtopic}</p>
        {questions.map((q,qi) => {
          const ua = answers[qi];
          return (
            <div key={qi} className="question-card">
              <div className="question-number">Question {qi+1}</div>
              <div className="question-text">{q.question}</div>
              <div className="options">
                {q.options.map((opt,ai) => {
                  let cls = "option-btn";
                  if(submitted) { cls+=" disabled"; if(ai===q.correct) cls+=" correct-answer"; else if(ai===ua && ua!==q.correct) cls+=" wrong-answer"; }
                  else if(ai===ua) cls+=" selected";
                  return <button key={ai} className={cls} onClick={() => !submitted && setAnswers(p => ({...p,[qi]:ai}))}>{opt}</button>;
                })}
              </div>
              {submitted && <div className="explanation"><strong>Explication :</strong> {q.explanation}</div>}
            </div>
          );
        })}
        {!submitted && (
          <div className="submit-row">
            <button className="primary-btn" style={{background:accentColor}} onClick={() => { if(Object.keys(answers).length < questions.length){setError("Réponds à toutes les questions !"); return;} setError(null); setSubmitted(true); setPhase("results"); }}>Valider</button>
            <span style={{color:"#475569",fontSize:"0.83rem"}}>{Object.keys(answers).length}/{questions.length} répondues</span>
          </div>
        )}
        {error && <div className="error-msg">{error}</div>}
        {submitted && (
          <div className="score-section">
            <hr className="section-sep"/>
            <div className="score-ring">
              <svg width="150" height="150" viewBox="0 0 150 150">
                <circle cx="75" cy="75" r="64" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="9"/>
                <circle cx="75" cy="75" r="64" fill="none" stroke={accentColor} strokeWidth="9" strokeDasharray={2*Math.PI*64} strokeDashoffset={2*Math.PI*64*(1-pct/100)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s ease"}}/>
              </svg>
              <div className="score-text"><span className="score-num">{score}</span><span className="score-denom">/{questions.length}</span></div>
            </div>
            <div className="score-label">{score===questions.length?"Parfait ! 🏆":pct>=66?"Très bien ! ✅":pct>=40?"En progrès 📚":"À revoir 🔄"}</div>
            <p className="score-comment">{score===questions.length?"Maîtrise totale. Tu peux aller plus loin.":pct>=66?"Bonne compréhension. Relis les points ratés.":pct>=40?"Quelques lacunes. Relis le cours et retente.":"Ce thème mérite une lecture attentive."}</p>
            <div className="results-actions">
              <button className="primary-btn" style={{background:accentColor}} onClick={generateQCM}>🔄 Nouveau QCM</button>
              <button className="ghost-btn" onClick={() => setPhase("course")}>📖 Relire</button>
              <button className="ghost-btn" onClick={reset}>🏠 Accueil</button>
            </div>
          </div>
        )}
      </div>
    )}

  </div>
</div>
</>
