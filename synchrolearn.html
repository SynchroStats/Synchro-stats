<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SynchroLearn</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#080c14;color:#e2eaf5;font-family:'DM Sans',sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.app{min-height:100vh;position:relative}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(56,189,248,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.04) 1px,transparent 1px);background-size:48px 48px}
.bg-glow{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(120px);opacity:0.1}
.content{position:relative;z-index:1}
.header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-family:'DM Serif Display',serif;font-size:1.4rem;color:#fff}
.logo-text span{color:#38bdf8}
.back-btn,.settings-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem}
.settings-btn{padding:6px 12px;font-size:0.9rem}
.hidden{display:none!important}
.fade{animation:fadein 0.3s ease}

/* HOME */
.home-hero{text-align:center;padding:48px 20px 32px}
.home-title{font-family:‘DM Serif Display’,serif;font-size:clamp(1.8rem,5vw,2.8rem);color:#fff;margin-bottom:12px;line-height:1.15}
.home-title em{color:#38bdf8;font-style:italic}
.home-sub{color:#64748b;max-width:420px;margin:0 auto;line-height:1.6;font-size:0.95rem}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:8px 16px 48px;max-width:1060px;margin:0 auto}
.topic-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px -8px var(–c);border-color:var(–c)}
.topic-icon{font-size:1.7rem;display:block;margin-bottom:8px}
.topic-label{font-size:0.88rem;font-weight:500;color:#e2eaf5;line-height:1.4}
.topic-count{font-size:0.74rem;color:#475569;margin-top:5px}
.topic-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#334155;transition:all 0.2s;font-size:1rem}
.topic-card:hover .topic-arrow{color:var(–c);transform:translateY(-50%) translateX(4px)}

/* PANEL */
.panel{max-width:640px;margin:0 auto;padding:32px 20px}
.panel-title{font-family:‘DM Serif Display’,serif;font-size:1.6rem;color:#fff;margin-bottom:6px}
.panel-sub{color:#64748b;font-size:0.87rem;margin-bottom:24px}
.subtopic-list{display:flex;flex-direction:column;gap:9px;margin-bottom:24px}
.subtopic-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-left:3px solid var(–c);border-radius:10px;padding:13px 16px;color:#cbd5e1;font-size:0.87rem;font-family:‘DM Sans’,sans-serif;cursor:pointer;text-align:left;transition:all 0.2s;line-height:1.4}
.subtopic-btn:hover{background:rgba(255,255,255,0.06);color:#fff;transform:translateX(3px)}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.08)}
.divider-text{color:#475569;font-size:0.77rem}
textarea.custom-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 15px;color:#e2eaf5;font-family:‘DM Sans’,sans-serif;font-size:0.87rem;outline:none;resize:vertical;min-height:70px;margin-bottom:10px}
textarea.custom-input:focus{border-color:var(–c)}
.primary-btn{background:var(–c);border:none;border-radius:10px;padding:12px 22px;color:#000;font-family:‘DM Sans’,sans-serif;font-weight:600;font-size:0.88rem;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:7px}
.primary-btn:disabled{opacity:0.35;cursor:not-allowed}
.ghost-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 20px;color:#94a3b8;font-family:‘DM Sans’,sans-serif;font-size:0.88rem;cursor:pointer;transition:all 0.2s}
.ghost-btn:hover{background:rgba(255,255,255,0.08);color:#e2eaf5}
.ghost-btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:18px}
.loading-crystal{animation:spin 8s linear infinite;opacity:0.5}
.loading-text{font-family:‘DM Serif Display’,serif;font-size:1.4rem;color:#94a3b8}
.loading-sub{color:#334155;font-size:0.82rem;text-align:center;max-width:300px}

/* COURSE */
.course-wrapper{max-width:680px;margin:0 auto;padding:32px 20px}
.course-tag{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:5px 12px;font-size:0.77rem;color:#94a3b8;margin-bottom:14px}
.course-title{font-family:‘DM Serif Display’,serif;font-size:1.6rem;color:#fff;margin-bottom:22px;line-height:1.25}
.course-body{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:26px;margin-bottom:22px}
.md h2{font-family:‘DM Serif Display’,serif;font-size:1.15rem;color:#fff;margin:22px 0 9px;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:5px}
.md h3{font-size:0.93rem;font-weight:600;color:#e2eaf5;margin:16px 0 5px}
.md p{margin-bottom:11px;line-height:1.75;color:#cbd5e1;font-size:0.9rem}
.md strong{color:#e2eaf5;font-weight:600}
.md em{color:#94a3b8}
.md ul{padding-left:18px;margin-bottom:11px}
.md li{margin-bottom:4px;line-height:1.6;color:#cbd5e1;font-size:0.9rem}
.extending-msg{text-align:center;padding:16px 0;color:#64748b;font-size:0.86rem}
.sep{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:20px 0}

/* QCM */
.qcm-wrapper{max-width:680px;margin:0 auto;padding:32px 20px}
.qcm-progress{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:18px;overflow:hidden}
.qcm-bar{height:100%;background:var(–c);border-radius:2px;transition:width 0.4s}
.question-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:13px;padding:22px;margin-bottom:14px}
.q-num{font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(–c);margin-bottom:7px}
.q-text{font-size:0.93rem;color:#e2eaf5;font-weight:500;margin-bottom:14px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:7px}
.opt-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:11px 15px;color:#94a3b8;font-family:‘DM Sans’,sans-serif;font-size:0.85rem;cursor:pointer;text-align:left;transition:all 0.2s;line-height:1.4;width:100%}
.opt-btn:hover{border-color:var(–c);color:#e2eaf5}
.opt-btn.selected{border-color:var(–c);color:#fff;background:rgba(56,189,248,0.08)}
.opt-btn.correct{border-color:#34d399;color:#34d399;background:rgba(52,211,153,0.08)}
.opt-btn.wrong{border-color:#f87171;color:#f87171;background:rgba(248,113,113,0.08)}
.opt-btn.disabled{cursor:default}
.explanation{margin-top:12px;padding:11px 13px;background:rgba(255,255,255,0.04);border-left:3px solid #34d399;border-radius:7px;font-size:0.82rem;color:#94a3b8;line-height:1.5}
.explanation strong{color:#34d399}
.submit-row{margin-top:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.count-label{color:#475569;font-size:0.82rem}
.error-msg{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:9px;padding:10px 14px;color:#fca5a5;font-size:0.84rem;margin:12px 0}

/* SCORE */
.score-section{text-align:center;padding:28px 0 8px}
.score-ring{width:140px;height:140px;margin:0 auto 20px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-family:‘DM Serif Display’,serif;font-size:2.4rem;color:#fff;line-height:1}
.score-denom{font-size:0.8rem;color:#64748b}
.score-label{font-family:‘DM Serif Display’,serif;font-size:1.4rem;color:#fff;margin-bottom:9px}
.score-comment{color:#64748b;font-size:0.88rem;margin-bottom:24px;line-height:1.6}
.results-actions{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}

/* API KEY SCREEN */
.apikey-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.apikey-box{max-width:460px;width:100%;text-align:center}
.apikey-title{font-family:‘DM Serif Display’,serif;font-size:1.9rem;color:#fff;margin:18px 0 8px}
.apikey-sub{color:#64748b;margin-bottom:28px;line-height:1.6;font-size:0.93rem}
.apikey-info{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:18px 22px;text-align:left;margin-bottom:18px}
.apikey-info p{color:#94a3b8;font-size:0.83rem;line-height:1.7}
.apikey-info strong{color:#e2eaf5}
.apikey-info .hint{color:#64748b;font-size:0.76rem;margin-top:8px}
.apikey-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:13px 16px;color:#e2eaf5;font-family:‘DM Sans’,sans-serif;font-size:0.88rem;outline:none;margin-bottom:10px}
.apikey-input:focus{border-color:#38bdf8}
.apikey-btn{width:100%;border:none;border-radius:10px;padding:13px;font-family:‘DM Sans’,sans-serif;font-weight:600;font-size:0.93rem;cursor:pointer;transition:all 0.2s}
</style>

</head>
<body>
<div id="app"></div>

<script>
const TOPICS = [
  {id:"physio",icon:"⚡",label:"Physiologie & Filières énergétiques",color:"#38bdf8",subtopics:["Filières ATP-CP, glycolytique et aérobie dans le patinage synchronisé","VO2max et capacité aérobie chez le patineur","Lactate et seuils d'intensité : comment les mesurer et les utiliser","Réponses cardio-vasculaires à l'effort sur glace"]},
  {id:"force",icon:"💪",label:"Force, Puissance & Explosivité",color:"#a78bfa",subtopics:["Développer la puissance musculaire chez le patineur synchronisé","Entraînement pliométrique et transfert au patinage","Force maximale vs force explosive : quand et comment les développer","Gainage et stabilisation du tronc pour le patinage"]},
  {id:"glisse",icon:"🛼",label:"Qualités de glisse & Technique",color:"#34d399",subtopics:["Biomécanique de la poussée en patinage synchronisé","Équilibre unipodal et proprioception sur glace","Analyse technique des éléments spécifiques (bloc, ligne, cercle, intersection)","Transfert des qualités athlétiques hors-glace vers la glisse"]},
  {id:"planif",icon:"📅",label:"Périodisation & Planification",color:"#fbbf24",subtopics:["Modèles de périodisation (classique, ondulatoire, par blocs) appliqués au patinage","Construire une saison de patinage synchronisé de A à Z","Gestion de la charge d'entraînement : charge interne vs externe","Planifier avec des contraintes de glace limitées"]},
  {id:"recup",icon:"🌙",label:"Récupération & Nutrition",color:"#f472b6",subtopics:["Stratégies de récupération après séance : cryothérapie, sommeil, nutrition","Nutrition du patineur en période de compétition","Gestion de la fatigue en fin de saison","HRV et monitoring de l'état de forme"]},
  {id:"mental",icon:"🧠",label:"Préparation mentale & Focus",color:"#fb923c",subtopics:["Gestion du stress compétitif chez les patineurs synchronisés","Routines pré-compétition : construire et individualiser","Imagerie mentale et visualisation en patinage","État de flow : conditions et moyens de le favoriser"]},
  {id:"management",icon:"🤝",label:"Management de groupe & Leadership",color:"#22d3ee",subtopics:["Dynamiques de groupe dans une équipe de patinage synchronisé","Styles de leadership en sport collectif : lequel adopter ?","Gérer les conflits au sein d'une équipe","Créer une culture d'équipe forte et cohésive"]},
  {id:"motivation",icon:"🔥",label:"Motivation individuelle & collective",color:"#ef4444",subtopics:["Théorie de l'autodétermination appliquée au sport","Motivation intrinsèque vs extrinsèque : impact et leviers","Fixer des objectifs efficaces (SMART, processus vs résultats)","Gérer la démotivation et les baisses de régime en cours de saison"]},
  {id:"compet",icon:"🏆",label:"Préparation à la compétition",color:"#84cc16",subtopics:["Affûtage (tapering) : principes et application en patinage synchronisé","Warm-up officiel de 6 minutes : stratégie et gestion collective","Préparer l'équipe psychologiquement J-7 à J-1","Analyse vidéo et scouting des adversaires"]},
  {id:"synchro",icon:"❄️",label:"Spécificités du Patinage Synchronisé",color:"#818cf8",subtopics:["Règlement ISU et éléments notés en patinage synchronisé","Cohésion spatiale et synchronisation : comment la travailler","Rôle du capitaine et leadership interne à l'équipe","Tendances actuelles du patinage synchronisé de haut niveau"]},
];

const SYSTEM = `Tu es un expert en sciences du sport et en coaching de patinage synchronisé, avec une maîtrise approfondie de la littérature scientifique internationale. Tu t'adresses à Frantz, préparateur physique et entraîneur assistant, titulaire d'un Master STAPS PPMR, travaillant avec des équipes tchèques. Tes réponses sont en français, ancrées dans la littérature scientifique (cite auteurs et études), structurées avec ## pour les titres et ** pour le gras, pratiques et applicables.`;

// STATE
let state = {
  phase: 'home', // home | subtopic | loading-course | course | loading-qcm | qcm
  apiKey: localStorage.getItem('sl_key') || '',
  topicId: null,
  subtopic: null,
  customText: '',
  course: '',
  extending: false,
  questions: [],
  answers: {},
  submitted: false,
  error: null,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// API
async function callClaude(userMsg, system) {
  const sys = system || SYSTEM;
  const body = {model:'claude-sonnet-4-6',max_tokens:1000,stream:false,system:sys,messages:[{role:'user',content:userMsg}]};
  let res, data;
  try {
    res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify(body)
    });
  } catch(e) { throw new Error('Réseau inaccessible : '+e.message); }
  try { data = await res.json(); } catch(e) { throw new Error('Réponse illisible (HTTP '+res.status+')'); }
  if(!res.ok) throw new Error('HTTP '+res.status+' — '+(data?.error?.message||'erreur API'));
  if(!data.content||!Array.isArray(data.content)) throw new Error('Réponse inattendue');
  return data.content.map(b=>b.text||'').join('');
}

// ACTIONS
async function generateCourse(sub) {
  setState({phase:'loading-course',error:null,course:'',questions:[],answers:{},submitted:false,subtopic:sub});
  const key = 'sl_c_'+btoa(encodeURIComponent(sub.slice(0,50))).replace(/[^a-zA-Z0-9]/g,'');
  const cached = localStorage.getItem(key);
  if(cached){setState({course:cached,phase:'course'});return;}
  try {
    const txt = await callClaude(`Fais un cours rigoureux sur : "${sub}", appliqué au patinage synchronisé. Structure en 4-5 sections avec ##. Cite des auteurs et études scientifiques.`);
    try{localStorage.setItem(key,txt);}catch(e){}
    setState({course:txt,phase:'course'});
  } catch(e){setState({error:e.message,phase:'subtopic'});}
}

async function extendCourse() {
  setState({extending:true,error:null});
  try {
    const more = await callClaude(`Continue ce cours sur "${state.subtopic}" avec des sections supplémentaires : exemples pratiques, applications sur glace, points avancés.\n\nFin du cours actuel :\n${state.course.slice(-500)}`);
    const extended = state.course+'\n\n---\n\n'+more;
    const key='sl_c_'+btoa(encodeURIComponent(state.subtopic.slice(0,50))).replace(/[^a-zA-Z0-9]/g,'');
    try{localStorage.setItem(key,extended);}catch(e){}
    setState({course:extended,extending:false});
  } catch(e){setState({error:e.message,extending:false});}
}

async function generateQCM() {
  setState({phase:'loading-qcm',error:null});
  const prompt = `Génère 4 QCM sur "${state.subtopic}" (patinage synchronisé / sciences du sport). JSON uniquement, aucun texte avant ou après : [{"question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"correct":0,"explanation":"..."},{"question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"correct":1,"explanation":"..."},{"question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"correct":2,"explanation":"..."},{"question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"correct":3,"explanation":"..."}]`;
  try {
    const raw = await callClaude(prompt,'Réponds UNIQUEMENT en JSON valide. Aucun texte, aucun markdown.');
    const clean = raw.replace(/```json|```/g,'').trim();
    const q = JSON.parse(clean);
    setState({questions:q,answers:{},submitted:false,phase:'qcm'});
  } catch(e){setState({error:'Erreur QCM : '+e.message,phase:'course'});}
}

// MARKDOWN
function md2html(text) {
  return text
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>');
}

function crystalSVG(size,spin,opacity){
  const s=size||24,o=opacity||0.5;
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" style="opacity:${o};${spin?'animation:spin 8s linear infinite':''}">
    <line x1="12" y1="2" x2="12" y2="22" stroke="white" stroke-width="1.5"/>
    <line x1="2" y1="12" x2="22" y2="12" stroke="white" stroke-width="1.5"/>
    <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" stroke="white" stroke-width="1.5"/>
    <line x1="19.07" y1="4.93" x2="4.93" y2="19.07" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="2.5" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="2" r="1.2" fill="white"/><circle cx="12" cy="22" r="1.2" fill="white"/>
    <circle cx="2" cy="12" r="1.2" fill="white"/><circle cx="22" cy="12" r="1.2" fill="white"/>
  </svg>`;
}

// RENDER
function render() {
  const app = document.getElementById('app');
  if(!state.apiKey){app.innerHTML=renderApiKey();bindApiKey();return;}
  const topic = TOPICS.find(t=>t.id===state.topicId);
  const c = topic?.color||'#38bdf8';
  document.documentElement.style.setProperty('--c',c);

  let inner='';
  if(state.phase==='home') inner=renderHome();
  else if(state.phase==='subtopic') inner=renderSubtopic(topic,c);
  else if(state.phase==='loading-course') inner=renderLoadingCourse();
  else if(state.phase==='loading-qcm') inner=renderLoadingQCM();
  else if(state.phase==='course') inner=renderCourse(topic,c);
  else if(state.phase==='qcm') inner=renderQCM(c);

  app.innerHTML=`
    <div class="app" style="--c:${c}">
      <div class="bg-grid"></div>
      <div class="bg-glow" style="width:500px;height:500px;background:${c};top:-180px;right:-180px"></div>
      <div class="bg-glow" style="width:350px;height:350px;background:#818cf8;bottom:-100px;left:-100px"></div>
      <div class="content">
        <div class="header">
          <div class="logo">${crystalSVG(24,false,0.7)}<span class="logo-text">Synchro<span>Learn</span></span></div>
          <div style="display:flex;gap:8px">
            ${state.phase!=='home'?`<button class="back-btn" onclick="setState({phase:'home',topicId:null,subtopic:null,error:null})">← Accueil</button>`:''}
            <button class="settings-btn" onclick="if(confirm('Changer de clé API ?')){localStorage.removeItem('sl_key');setState({apiKey:''})}">🔑</button>
          </div>
        </div>
        ${inner}
      </div>
    </div>`;
  bindEvents();
}

function renderApiKey(){return`
  <div class="app"><div class="bg-grid"></div>
  <div class="bg-glow" style="width:500px;height:500px;background:#38bdf8;top:-180px;right:-180px"></div>
  <div class="content"><div class="apikey-screen">
  <div class="apikey-box">
    ${crystalSVG(48,false,0.6)}
    <div class="apikey-title">SynchroLearn</div>
    <p class="apikey-sub">Entre ta clé API Anthropic pour commencer.<br>Elle sera mémorisée sur cet appareil.</p>
    <div class="apikey-info">
      <p><strong>Obtenir une clé API :</strong><br>
      1. Va sur <span style="color:#38bdf8">console.anthropic.com</span><br>
      2. Crée un compte (gratuit)<br>
      3. "API Keys" → "Create Key"<br>
      4. Copie la clé (commence par <code style="color:#38bdf8">sk-ant-</code>)</p>
      <p class="hint">💡 Coût estimé : ~0.01€ par cours généré</p>
    </div>
    <input type="password" id="apikey-input" class="apikey-input" placeholder="sk-ant-api03-..." oninput="updateApiBtn()"/>
    <button id="apikey-btn" class="apikey-btn" style="background:#1e293b;color:#475569;cursor:not-allowed" disabled onclick="saveApiKey()">Commencer →</button>
  </div></div></div></div>`;}

function bindApiKey(){
  window.updateApiBtn=function(){
    const v=document.getElementById('apikey-input').value.trim();
    const btn=document.getElementById('apikey-btn');
    const ok=v.startsWith('sk-ant-');
    btn.disabled=!ok;
    btn.style.background=ok?'#38bdf8':'#1e293b';
    btn.style.color=ok?'#000':'#475569';
    btn.style.cursor=ok?'pointer':'not-allowed';
  };
  window.saveApiKey=function(){
    const v=document.getElementById('apikey-input').value.trim();
    if(v.startsWith('sk-ant-')){localStorage.setItem('sl_key',v);setState({apiKey:v});}
  };
}

function renderCourse(topic,c){
return`<div class="course-wrapper fade"> <div class="course-tag">${topic?.icon||''} ${topic?.label||''}</div> <h2 class="course-title">${state.subtopic}</h2> <div class="course-body"> <div class="md"><p>${md2html(state.course)}</p></div> ${state.extending?`<div class="extending-msg">${crystalSVG(24,true,0.4)} Approfondissement…</div>`:''} </div> ${state.error?`<div class="error-msg">${state.error}</div>`:’’}
<div class="btn-row">
<button class=“primary-btn” style=“background:${c}” onclick=“generateQCM()” ${state.extending?‘disabled’:’’}>🎯 Tester mes connaissances</button>
<button class=“ghost-btn” onclick=“extendCourse()” ${state.extending?‘disabled’:’’}>${state.extending?‘⏳ En cours…’:‘📖 Approfondir’}</button>
<button class="ghost-btn" onclick="setState({phase:'subtopic',error:null})">← Changer</button>
</div>

  </div>`;}

function renderQCM(c){
const answered=Object.keys(state.answers).length;
const total=state.questions.length;
const score=state.questions.filter((q,i)=>state.answers[i]===q.correct).length;
const pct=total?Math.round(score/total*100):0;
const circ=2*Math.PI*64;

const qs=state.questions.map((q,qi)=>{
const ua=state.answers[qi];
const opts=q.options.map((opt,ai)=>{
let cls=‘opt-btn’;
if(state.submitted){cls+=’ disabled’;if(ai===q.correct)cls+=’ correct’;else if(ai===ua&&ua!==q.correct)cls+=’ wrong’;}
else if(ai===ua)cls+=’ selected’;
return`<button class="${cls}" onclick="if(!state.submitted){state.answers[${qi}]=${ai};render()}">${opt}</button>`;
}).join(’’);
const expl=state.submitted?`<div class="explanation"><strong>Explication :</strong> ${q.explanation}</div>`:’’;
return`<div class="question-card"><div class="q-num">Question ${qi+1}</div><div class="q-text">${q.question}</div><div class="options">${opts}</div>${expl}</div>`;
}).join(’’);

const scoreSection=state.submitted?` <hr class="sep"> <div class="score-section"> <div class="score-ring"> <svg width="140" height="140" viewBox="0 0 140 140"> <circle cx="70" cy="70" r="64" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="9"/> <circle cx="70" cy="70" r="64" fill="none" stroke="${c}" stroke-width="9" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/> </svg> <div class="score-inner"><span class="score-num">${score}</span><span class="score-denom">/${total}</span></div> </div> <div class="score-label">${score===total?'Parfait ! 🏆':pct>=66?'Très bien ! ✅':pct>=40?'En progrès 📚':'À revoir 🔄'}</div> <p class="score-comment">${score===total?'Maîtrise totale. Tu peux aller plus loin.':pct>=66?'Bonne compréhension. Relis les points ratés.':pct>=40?'Quelques lacunes. Relis et retente.':'Ce thème mérite une lecture attentive.'}</p> <div class="results-actions"> <button class="primary-btn" style="background:${c}" onclick="generateQCM()">🔄 Nouveau QCM</button> <button class="ghost-btn" onclick="setState({phase:'course'})">📖 Relire</button> <button class="ghost-btn" onclick="setState({phase:'home',topicId:null,subtopic:null,error:null})">🏠 Accueil</button> </div> </div>`:’’;

const submitRow=!state.submitted?` <div class="submit-row"> <button class="primary-btn" style="background:${c}" onclick=" if(Object.keys(state.answers).length<${total}){state.error='Réponds à toutes les questions !';render();return;} state.submitted=true;state.error=null;render();">Valider</button> <span class="count-label">${answered}/${total} répondues</span> </div>`:’’;

return`<div class="qcm-wrapper fade"> <div class="qcm-progress"><div class="qcm-bar" style="width:${answered/total*100}%"></div></div> <div class="panel-title" style="margin-bottom:4px">QCM</div> <p class="panel-sub" style="margin-bottom:22px">${state.subtopic}</p> ${qs} ${state.error?`<div class="error-msg">${state.error}</div>`:’’}
${submitRow}
${scoreSection}

  </div>`;}

function bindEvents(){
const ci=document.getElementById(‘custom-input’);
if(ci){ci.addEventListener(‘input’,function(){
state.customText=this.value;
const btn=document.getElementById(‘custom-btn’);
if(btn)btn.disabled=!this.value.trim();
});}
}

// INIT
render();
</script>
